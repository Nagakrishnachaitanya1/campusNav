<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CampusNav – Intelligent Campus Navigation</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/map.css">
  <link rel="stylesheet" href="/static/indoor.css">
  <link rel="stylesheet" href="/static/parking.css">
</head>

<body>

  <div class="app">
    <header class="topbar">
      <div class="tb-brand">CampusNav</div>
      <div class="tb-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" placeholder="Search departments, labs, or cafes...">
        <svg class="mic-ico" viewBox="0 0 24 24">
          <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z" />
          <path d="M19 10v2a7 7 0 01-14 0v-2" />
        </svg>
      </div>
      <div class="tb-right">
        <div class="tb-pill"><span class="w-ico">🌤️</span> 72°F <span class="lt">SUNNY</span></div>
        <div class="tb-pill"><span class="dot-g"></span> STATUS: OPEN</div>


      </div>
    </header>

    <div class="body-row">
      <nav class="sidebar">
        <div class="sb-top">
          <div class="sb-label">Digital Cartographer</div>
          <div class="sb-title">Navigation</div>

          <div class="sb-nav">
            <a href="#" class="sb-item" data-view="map">
              <span class="sb-icon"><svg viewBox="0 0 24 24">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                  <line x1="9" y1="3" x2="9" y2="21" />
                  <line x1="3" y1="9" x2="9" y2="9" />
                  <line x1="3" y1="15" x2="9" y2="15" />
                </svg></span>
              Map Explorer
            </a>
            <a href="#" class="sb-item active" data-view="indoor">
              <span class="sb-icon"><svg viewBox="0 0 24 24">
                  <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                </svg></span>
              Indoor Nav
            </a>
            <a href="#" class="sb-item" data-view="parking">
              <span class="sb-icon"><svg viewBox="0 0 24 24">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" />
                  <circle cx="12" cy="10" r="3" />
                </svg></span>
              Parking Hub
            </a>
          </div>
        </div>

        <div class="sb-bottom">
          <div class="shuttle">
            <div class="sh-label">Live Tracker</div>
            <div class="sh-title"><span class="dot-g sm" style="background:#fff;box-shadow:none"></span> Route A: On
              Time</div>
            <div class="sh-sub">Turing Hall in 2 min</div>
            <div class="sh-bar">
              <div class="sh-fill" style="width:30%"></div>
              <div class="sh-seg"></div>
              <div class="sh-seg"></div>
              <div class="sh-seg"></div>
            </div>
          </div>


        </div>
      </nav>
      <div class="center">
        <section class="view" id="view-map">
          {% include "map.html" %}
        </section>
        <section class="view" id="view-indoor">
          {% include "indoor.html" %}
        </section>
        <section class="view" id="view-parking">
          {% include "parking.html" %}
        </section>

      </div>
    </div>
  </div>
  <script src="/static/app.js"></script>
  <script src="/static/map.js"></script>
  <script src="/static/indoor.js"></script>
  <script src="/static/parking.js"></script>




</body>

</html>
